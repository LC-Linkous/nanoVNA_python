name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:        # allows manual runs from the Actions tab

jobs:
  test:
    name: test (hardware-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install package with test extras
        run: uv pip install --system -e "nvnapython[test]"   # project lives in the nvnapython/ subdirectory

      - name: Run hardware-free tests
        run: pytest -m "not hardware" -q nvnapython/tests

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build nvnapython          # project lives in the nvnapython/ subdirectory

      - name: Store distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: nvnapython/dist/          # uv writes dist/ inside the project dir

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # must match the environment in your PyPI publisher config
    permissions:
      id-token: write          # REQUIRED for trusted publishing (OIDC)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1